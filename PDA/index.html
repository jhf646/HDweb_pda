<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <title>PDA操作系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="login-page" class="page active">
            <div class="login-container">
                <div class="login-logo">
                    <img src="logo.png" alt="系统Logo">
                </div>
                <h2>宏大立库 PDA 系统</h2>
                <p class="login-subtitle">智能仓储管理平台</p>
                <form id="login-form">
                    <div class="input-group">
                        <div class="input-icon">👤</div>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="input-group">
                        <div class="input-icon">🔒</div>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn-primary btn-login">登 录</button>
                </form>
                <div class="login-footer">
                    <p>© 2026 宏大立库 | 仓储管理系统</p>
                </div>
            </div>
        </div>

        <div id="main-page" class="page">
            <div class="header">
                <h2>宏大立库 PDA 系统</h2>
                <button id="logout-btn" class="btn-secondary">退出</button>
            </div>
            
            <div class="content">
                <!-- 首页：显示三个选项卡 -->
                <div id="home-page" class="sub-page active">
                    <!-- <div class="home-title">请选择操作</div> -->
                    <div class="nav-menu">
                        <button class="nav-option" data-page="inbound-page">
                            <div class="option-icon">📦</div>
                            <div class="option-title">入库绑定</div>
                        </button>
                        <button class="nav-option" data-page="outbound-page">
                            <div class="option-icon">🚚</div>
                            <div class="option-title">备料出库</div>
                        </button>
                        <button class="nav-option" data-page="confirm-page">
                            <div class="option-icon">✅</div>
                            <div class="option-title">出库确认</div>
                        </button>
                        <button class="nav-option" data-page="empty-page">
                            <div class="option-icon">📭</div>
                            <div class="option-title">空托出库</div>
                        </button>
                    </div>
                </div>
                
                <!-- 入库绑定页面 -->
                <div id="inbound-page" class="sub-page">
                    <div class="page-header">
                        <button class="back-btn" data-back="home-page">← 返回</button>
                        <h3>入库绑定</h3>
                    </div>
                    <form id="inbound-form">
                        <div class="input-group input-group-inline">
                            <label for="inbound-pallet-id">托盘号:</label>
                            <input type="text" id="inbound-pallet-id" name="palletID" required 
                                   placeholder="请扫描或输入">
                        </div>
                    </form>
                    
                    <!-- 托盘状态信息 -->
                    <div id="pallet-status-area" class="status-area"></div>
                    
                    <!-- 库存列表表格 -->
                    <div id="inventory-table-area" class="table-area">
                        <div class="table-header">
                            <h4>库存明细</h4>
                            <button class="btn-add-row" id="btn-add-inventory">+ 新增行</button>
                        </div>
                        <div class="table-wrapper">
                            <table id="inventory-table" class="inventory-table">
                                <thead>
                                    <tr>
                                        <th>物料号</th>
                                        <th>数量</th>
                                        <th>型号规格</th>
                                        <th>单位</th>
                                        <th>单据号</th>
                                        <th>供应商</th>
                                        <th>描述</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="inventory-table-body">
                                </tbody>
                            </table>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-primary" id="btn-submit-inventory">提交绑定</button>
                            <button type="button" class="btn-secondary" id="btn-reset-inventory">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 分拣出库页面 -->
                <div id="outbound-page" class="sub-page">
                    <div class="page-header">
                        <button class="back-btn" data-back="home-page">← 返回</button>
                        <h3>备料出库</h3>
                    </div>
                    <form id="outbound-form">
                        <div class="input-group input-group-inline">
                            <label for="outbound-item-id">物料号:</label>
                            <input type="text" id="outbound-item-id" name="itemID" required 
                                   placeholder="请扫描或输入">
                        </div>
                    </form>
                    
                    <!-- 状态提示区域 -->
                    <div id="outbound-status-area" class="status-area"></div>
                    
                    
                    <!-- 库存信息表格 -->
                    <div id="outbound-table-area" class="table-area">
                        <div class="table-header">
                            <h4>库存信息</h4>
                            <button type="button" class="btn-primary" id="btn-bulk-outbound">出库所选</button>
                        </div>
                        <div class="table-wrapper">
                            <table id="outbound-table" class="inventory-table">
                                <thead>
                                    <tr>
                                        <th><input type="checkbox" id="select-all"></th>
                                        <th>库位</th>
                                        <th>托盘号</th>
                                        <th>供应商</th>
                                        <th>物料号</th>
                                        <th>描述</th>
                                        <th>型号</th>
                                        <th>数量</th>
                                        <th>单位</th>
                                    </tr>
                                </thead>
                                <tbody id="outbound-table-body">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 空托出库页面 -->
                <div id="empty-page" class="sub-page">
                    <div class="page-header">
                        <button class="back-btn" data-back="home-page">← 返回</button>
                        <h3>空托出库</h3>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-primary" id="btn-empty-pallet">执行空托出库</button>
                    </div>
                    <div id="empty-status-area" class="status-area"></div>
                </div>

                <!-- 出库确认页面 -->
                <div id="confirm-page" class="sub-page">
                    <div class="page-header">
                        <button class="back-btn" data-back="home-page">← 返回</button>
                        <h3>出库确认</h3>
                    </div>
                    <form id="confirm-form">
                        <div class="input-group input-group-inline">
                            <label for="confirm-pallet-id">托盘号:</label>
                            <input type="text" id="confirm-pallet-id" name="palletID" required 
                                   placeholder="请扫描或输入">
                        </div>
                    </form>
                    
                    <!-- 状态提示区域 -->
                    <div id="confirm-status-area" class="status-area"></div>
                    
                    <!-- 库存列表表格 -->
                    <div id="confirm-table-area" class="table-area">
                        <div class="table-header">
                            <h4>库存明细</h4>
                        </div>
                        <div class="table-wrapper">
                            <table id="confirm-table" class="inventory-table">
                                <thead>
                                    <tr>
                                        <th>库存编号</th>
                                        <th>物料号</th>
                                        <th>数量</th>
                                        <th>出库数量</th>
                                    </tr>
                                </thead>
                                <tbody id="confirm-table-body">
                                </tbody>
                            </table>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-primary" id="btn-confirm-outbound">确认出库</button>
                            <button type="button" class="btn-secondary" id="btn-reset-confirm">重置</button>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 自定义确认对话框 -->
    <div id="confirm-dialog" class="confirm-dialog">
        <div class="confirm-dialog-overlay"></div>
        <div class="confirm-dialog-content">
            <div class="confirm-dialog-header">
                <h3>确认操作</h3>
            </div>
            <div class="confirm-dialog-body">
                <p id="confirm-dialog-message">确认要执行此操作吗？</p>
            </div>
            <div class="confirm-dialog-footer">
                <button class="btn-cancel" id="confirm-dialog-cancel">取消</button>
                <button class="btn-confirm" id="confirm-dialog-ok">确认</button>
            </div>
        </div>
    </div>

            }

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
